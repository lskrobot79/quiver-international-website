  <!-- Fletching -->
  <path d="M17 10 Q20 12 20 8 Q20 12 23 10" fill="#C75050" stroke="#8B3030" stroke-width="0.5"/>
  <path d="M17 14 Q20 16 20 12 Q20 16 23 14" fill="#C75050" stroke="#8B3030" stroke-width="0.5"/>

  <!-- Arrow 2 (center left) -->
  <line x1="24" y1="6" x2="24" y2="46" stroke="#D4B896" stroke-width="1.5"/>
  <!-- Fletching -->
  <path d="M21 8 Q24 10 24 6 Q24 10 27 8" fill="#C75050" stroke="#8B3030" stroke-width="0.5"/>
  <path d="M21 12 Q24 14 24 10 Q24 14 27 12" fill="#C75050" stroke="#8B3030" stroke-width="0.5"/>

  <!-- Arrow 3 (center) -->
  <line x1="28" y1="4" x2="28" y2="44" stroke="#D4B896" stroke-width="1.5"/>
  <!-- Fletching -->
  <path d="M25 6 Q28 8 28 4 Q28 8 31 6" fill="#C75050" stroke="#8B3030" stroke-width="0.5"/>
  <path d="M25 10 Q28 12 28 8 Q28 12 31 10" fill="#C75050" stroke="#8B3030" stroke-width="0.5"/>

