<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Quiver body - leather cylinder -->
  <path d="M22 58 C18 58 16 56 16 52 L16 20 C16 16 18 14 22 14 L32 12 C36 12 38 14 38 18 L38 54 C38 58 36 60 32 60 L22 58 Z" fill="#8B5A2B" stroke="#5D3A1A" stroke-width="1.5"/>

